<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlas Search</title>
    <style>
      :root {
        --bg: #f5f1e8;
        --panel: #fffaf0;
        --ink: #1f2937;
        --muted: #6b7280;
        --accent: #0f766e;
        --border: #d6d3d1;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top right, rgba(15,118,110,0.14), transparent 30%),
          linear-gradient(180deg, #f9f4e8 0%, var(--bg) 100%);
      }
      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 40px 20px 64px;
      }
      .hero {
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: rgba(255,250,240,0.86);
        backdrop-filter: blur(8px);
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 4vw, 3.4rem);
        line-height: 0.95;
      }
      p { color: var(--muted); }
      form {
        display: grid;
        gap: 12px;
        margin-top: 24px;
      }
      textarea, input, button {
        font: inherit;
      }
      textarea, input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 14px 16px;
        background: white;
      }
      .row {
        display: grid;
        grid-template-columns: 2fr 1fr auto;
        gap: 12px;
      }
      button {
        border: 0;
        background: var(--accent);
        color: white;
        border-radius: 16px;
        padding: 14px 18px;
        cursor: pointer;
      }
      .section {
        margin-top: 24px;
        padding: 24px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--panel);
      }
      .result {
        padding: 16px 0;
        border-top: 1px solid #e7e5e4;
      }
      .result:first-child {
        border-top: 0;
        padding-top: 0;
      }
      .url {
        color: var(--accent);
        font-size: 0.95rem;
        word-break: break-all;
      }
      .meta {
        color: var(--muted);
        font-size: 0.9rem;
      }
      .answer {
        border-left: 4px solid var(--accent);
        padding-left: 16px;
        margin-bottom: 18px;
      }
      .status {
        color: var(--muted);
        min-height: 1.2em;
      }
      @media (max-width: 780px) {
        .row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>Atlas Search</h1>
        <p>Google-inspired hybrid search with crawl, ranking, and grounded AI answers.</p>

        <form id="crawl-form">
          <label for="urls">Seed URLs</label>
          <textarea id="urls" rows="3" placeholder="One URL per line">https://example.com
https://go.dev</textarea>
          <button type="submit">Crawl URLs</button>
        </form>

        <form id="search-form">
          <div class="row">
            <input id="query" type="text" placeholder="Search Atlas..." value="go" />
            <input id="limit" type="number" min="1" max="20" value="5" />
            <button type="submit">Search</button>
          </div>
        </form>
        <div class="status" id="status"></div>
      </section>

      <section class="section">
        <h2>Results</h2>
        <div id="results"></div>
      </section>
    </main>

    <script>
      const statusEl = document.getElementById("status");
      const resultsEl = document.getElementById("results");

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function renderSearch(payload) {
        const parts = [];
        if (payload.answer) {
          parts.push(`
            <div class="answer">
              <strong>Grounded answer</strong>
              <p>${payload.answer.summary}</p>
            </div>
          `);
        }

        if (!payload.results || payload.results.length === 0) {
          parts.push("<p>No results yet. Crawl a page and search again.</p>");
          resultsEl.innerHTML = parts.join("");
          return;
        }

        for (const result of payload.results) {
          parts.push(`
            <article class="result">
              <div class="url">${result.url}</div>
              <h3>${result.title}</h3>
              <p>${result.snippet}</p>
              <div class="meta">Score: ${result.score.toFixed(3)}</div>
            </article>
          `);
        }
        resultsEl.innerHTML = parts.join("");
      }

      document.getElementById("crawl-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const urls = document.getElementById("urls").value
          .split("\n")
          .map((value) => value.trim())
          .filter(Boolean);

        setStatus("Crawling pages...");
        const response = await fetch("/api/v1/crawl", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ urls })
        });
        const payload = await response.json();
        setStatus(`Crawled ${payload.documents?.length || 0} page(s).`);
      });

      document.getElementById("search-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const query = document.getElementById("query").value.trim();
        const limit = document.getElementById("limit").value || "5";

        setStatus(`Searching for "${query}"...`);
        const response = await fetch(`/api/v1/search?q=${encodeURIComponent(query)}&limit=${encodeURIComponent(limit)}`);
        const payload = await response.json();
        renderSearch(payload);
        setStatus(`Found ${payload.count || 0} result(s).`);
      });
    </script>
  </body>
</html>
